<!DOCTYPE html>
<!--
Author: qp91mn64
Created: 2026-03-27

Control multiple circles with the same fuzzy controller.
Only one instance of fuzzy controller is needed.
-->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Simple Fuzzy Controller with p5.js</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="simple-fuzzy-controller-2.js"></script>
</head>
<body>
    <script>
        let x = [];
        let v = [];
        let circleCount = 100;
        let dt;  // Time interval for updating the location x
        let config;
        let fuzzyController;
        let given;
        function setup() {
            createCanvas(600, 360);  // width: 600
            for (let i = 0; i < circleCount; i++) {
                x.push(Math.random() * 600);  // Change to see different output
                v.push(0);
            }
            dt = 1;
            config = {
                method_FR: "Mamdani",
            };
            fuzzyController = new FuzzyController(config);
            given = 300;
        }
        function draw() {
            background(204);  // clear the canvas
            for (let i = 0; i < circleCount; i++) {
                v[i] = fuzzyController.control(x[i], given);  // control the x coordinate of each circle separately to follow the given value
                x[i] += v[i] * dt;  // update the location
            }
            display();  // visualization
        }
        function display() {
            for (let i = 0; i < circleCount; i++) {
                fill((v[i] + 1) * 127.5);  // The color of the circle changes with the change of speed
                circle(x[i], 5 + i * 3, 5);
            }
        }
    </script>
</body>
