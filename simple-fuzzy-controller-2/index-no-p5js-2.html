<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Simple Fuzzy Controller without p5.js</title>
    <script src="simple-fuzzy-controller-2.js"></script>
</head>
<body>
    <script>
        let x = 240;  // Change to see different outputs
        let dt = 1;  // Time interval for updating the location x
        let v;
        let given = 300;  // The given quantity for the fuzzy controller
        let config = {};
        let fuzzyController = new FuzzyController(config);
        console.log(`x 的初始值：${x}`);
        for (let t = 0; t < 100; t += dt) {
            v = fuzzyController.control(x, given);
            x += v * dt;
            console.log(`经过时间 ${t} 之后，x 的值：${x}`);
        }
    </script>
</body>
